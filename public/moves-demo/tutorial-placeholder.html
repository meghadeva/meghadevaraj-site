<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>moves — interactive tutorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --purple:#7C6FF7; --purple-light:#EEEDff; --purple-mid:#C4C0FC;
  --green:#1DB97A; --green-light:#E0F7EE;
  --red:#F04E4E; --red-light:#FDEAEA;
  --amber:#F5A623; --amber-light:#FEF3DC;
  --gray-50:#F8F7F5; --gray-100:#F0EEE9; --gray-200:#E2DED6;
  --gray-300:#C8C3B8; --gray-500:#8A857A; --gray-700:#4A4540; --gray-900:#1C1A17;
  --white:#FFFFFF;
  --font-main:'DM Sans',sans-serif; --font-display:'DM Serif Display',serif;
  --r-sm:8px; --r-md:12px; --r-lg:18px; --r-xl:24px; --r-full:9999px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06); --shadow-md:0 4px 12px rgba(0,0,0,.08); --shadow-lg:0 16px 40px rgba(0,0,0,.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font-main);background:#E8E4DD;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;
  background-image:radial-gradient(circle at 20% 20%,rgba(124,111,247,.08) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(29,185,122,.06) 0%,transparent 50%);}

/* ── PROGRESS BAR ── */
.progress-wrap{width:390px;max-width:100%;margin-bottom:16px;}
.progress-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.progress-logo{font-family:var(--font-display);font-size:22px;color:var(--gray-900);}
.progress-logo em{color:var(--purple);font-style:italic;}
.progress-meta{display:flex;align-items:center;gap:10px;}
.progress-label{font-size:12px;color:var(--gray-500);}
.reset-btn{font-size:12px;font-weight:500;color:var(--gray-500);background:var(--gray-100);border:1px solid var(--gray-200);border-radius:var(--r-full);padding:4px 12px;cursor:pointer;font-family:var(--font-main);transition:all .12s;}
.reset-btn:hover{color:var(--red);border-color:var(--red-light);}
.progress-track{height:6px;background:var(--gray-200);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),#A89BF9);border-radius:3px;transition:width .4s ease;}
.step-dots{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-200);transition:all .3s;}
.step-dot.done{background:var(--purple);}
.step-dot.active{background:var(--purple);box-shadow:0 0 0 3px var(--purple-light);}

/* ── PHONE FRAME ── */
.phone-frame{width:390px;max-width:100%;height:780px;background:var(--white);border-radius:44px;
  box-shadow:var(--shadow-lg),0 0 0 8px #D4D0C8,0 0 0 10px #C8C4BC;
  overflow:hidden;position:relative;display:flex;flex-direction:column;}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 4px;font-size:12px;font-weight:500;color:var(--gray-700);flex-shrink:0;}
.dynamic-island{width:120px;height:34px;background:var(--gray-900);border-radius:var(--r-full);position:absolute;top:10px;left:50%;transform:translateX(-50%);}
.app-header{padding:10px 20px 0;border-bottom:1px solid var(--gray-100);flex-shrink:0;}
.app-logo{font-family:var(--font-display);font-size:26px;color:var(--gray-900);letter-spacing:-.5px;margin-bottom:10px;}
.app-logo em{color:var(--purple);font-style:italic;}
.tab-row{display:flex;gap:4px;}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:13px;color:var(--gray-500);border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:500;}
.content-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px 12px;-webkit-overflow-scrolling:touch;}
.content-area::-webkit-scrollbar{display:none;}
.bottom-nav{display:flex;border-top:1px solid var(--gray-100);padding:10px 0 20px;background:var(--white);flex-shrink:0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--gray-300);font-size:10px;font-weight:500;}
.nav-item.active{color:var(--purple);}
.nav-icon{font-size:22px;line-height:1;}

/* ── LOCK OVERLAY ── */
.lock-overlay{position:absolute;inset:0;z-index:40;border-radius:44px;background:transparent;}
.lock-overlay.dim{background:rgba(28,26,23,.35);}

/* ── SPOTLIGHT (cutout for unlocked element) ── */
.spotlight{position:absolute;border-radius:var(--r-lg);box-shadow:0 0 0 9999px rgba(28,26,23,.5);z-index:41;pointer-events:none;transition:all .3s;}

/* ── BOTTOM SHEET TOOLTIP ── */
.bs-overlay{position:absolute;inset:0;z-index:60;border-radius:44px;display:flex;align-items:flex-end;}
.bs-sheet{background:var(--white);border-radius:28px 28px 0 0;width:100%;padding:0 20px 28px;animation:slideUp .28s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.bs-handle{width:40px;height:4px;background:var(--gray-200);border-radius:2px;margin:14px auto 18px;}
.bs-emoji{font-size:32px;margin-bottom:10px;}
.bs-title{font-size:18px;font-weight:600;color:var(--gray-900);margin-bottom:8px;line-height:1.3;}
.bs-body{font-size:14px;color:var(--gray-500);line-height:1.6;margin-bottom:20px;}
.bs-body strong{color:var(--gray-900);}
.bs-cta{width:100%;padding:14px;background:var(--purple);color:white;border:none;border-radius:var(--r-md);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-main);transition:all .12s;}
.bs-cta:hover{background:#6A5FF5;}
.bs-skip{display:block;text-align:center;margin-top:12px;font-size:13px;color:var(--gray-400);cursor:pointer;}

/* ── SPEECH BUBBLE ── */
.bubble-wrap{position:absolute;z-index:60;pointer-events:none;}
.bubble{background:var(--purple);color:white;border-radius:14px;padding:10px 14px;font-size:13px;line-height:1.5;font-weight:400;max-width:220px;box-shadow:var(--shadow-md);pointer-events:auto;}
.bubble strong{font-weight:600;}
.bubble-arrow{width:0;height:0;}
.bubble-arrow.down{border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid var(--purple);margin:0 auto;}
.bubble-arrow.up{border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:10px solid var(--purple);margin:0 auto;}
.bubble-arrow.left{border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:10px solid var(--purple);margin:auto 0;}
.bubble-tap{margin-top:10px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:var(--r-full);padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;display:inline-block;pointer-events:auto;}

/* ── UI ELEMENTS (simplified app) ── */
.card{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .12s;box-shadow:var(--shadow-sm);}
.card:hover{background:var(--gray-50);}
.card-row{display:flex;align-items:center;gap:12px;}
.card-icon{width:44px;height:44px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--gray-50);}
.card-title{font-size:15px;font-weight:500;color:var(--gray-900);}
.card-sub{font-size:12px;color:var(--gray-500);margin-top:2px;}
.sec-label{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;margin-top:4px;}
.add-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border:1.5px dashed var(--gray-200);border-radius:var(--r-lg);cursor:pointer;font-size:14px;color:var(--purple);font-weight:500;margin-bottom:10px;transition:all .12s;}
.add-row:hover{background:var(--purple-light);border-color:var(--purple-mid);}
.ev-card{border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;background:var(--white);box-shadow:var(--shadow-sm);position:relative;}
.ev-icon{width:46px;height:46px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.ev-title{font-size:15px;font-weight:500;color:var(--gray-900);}
.ev-meta{font-size:12px;color:var(--gray-500);margin-top:2px;}
.ev-date{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:var(--gray-700);background:var(--gray-50);border:1px solid var(--gray-200);padding:3px 10px;border-radius:var(--r-full);margin-top:6px;}
.float-btn{position:absolute;top:12px;right:12px;background:var(--purple-light);border:1px solid var(--purple-mid);color:var(--purple);border-radius:var(--r-full);font-size:12px;font-weight:600;padding:3px 10px;cursor:pointer;font-family:var(--font-main);}
.v3row{display:flex;gap:6px;margin-top:10px;}
.v3btn{flex:1;padding:8px 4px;border-radius:var(--r-md);font-size:12px;font-weight:500;border:1px solid var(--gray-200);background:var(--gray-50);color:var(--gray-500);cursor:pointer;font-family:var(--font-main);text-align:center;}
.v3btn.super{background:#E8F5E9;border-color:#9FD4AC;color:#1B6B2E;}
.v3btn.could{background:var(--amber-light);border-color:#F0C97A;color:#8C5100;}
.v3btn.pass{background:var(--red-light);border-color:#F7C1C1;color:#A32D2D;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r-full);font-size:11px;font-weight:500;}
.pill-super{background:#E8F5E9;color:#1B6B2E;}
.pill-could{background:var(--amber-light);color:#8C5100;}
.pill-pass{background:var(--red-light);color:#A32D2D;}
.pill-pending{background:var(--gray-100);color:var(--gray-500);}
.pill-tap{background:var(--amber-light);color:#8C5100;cursor:pointer;border:1px dashed var(--amber);}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0;border:2px solid var(--white);}
.av-sm{width:26px;height:26px;font-size:9px;}
.av-0{background:#EEEDff;color:#534AB7;} .av-1{background:#E1F5EE;color:#0F6E56;}
.av-2{background:#FAECE7;color:#993C1D;} .av-3{background:#FBEAF0;color:#993556;}
.av-4{background:#E6F1FB;color:#185FA5;} .av-5{background:#FAEEDA;color:#854F0B;}
.member-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-top:1px solid var(--gray-50);}
.member-name{font-size:13px;color:var(--gray-700);flex:1;}
.progress-bar{height:4px;background:var(--gray-100);border-radius:2px;margin-bottom:10px;overflow:hidden;}
.progress-fill-bar{height:100%;background:linear-gradient(90deg,var(--purple),#A89BF9);border-radius:2px;}
.type-toggle{display:flex;background:var(--gray-100);border-radius:var(--r-md);padding:3px;gap:2px;margin-bottom:14px;}
.type-btn{flex:1;padding:7px 8px;text-align:center;font-size:13px;color:var(--gray-500);border-radius:9px;cursor:pointer;transition:all .15s;}
.type-btn.active{background:var(--white);color:var(--gray-900);font-weight:500;box-shadow:var(--shadow-sm);}
.floated-banner{background:linear-gradient(135deg,var(--purple-light),#F5F3FF);border:1px solid var(--purple-mid);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:14px;}
.input-field{width:100%;padding:10px 14px;border:1px solid var(--gray-200);border-radius:var(--r-md);font-size:14px;color:var(--gray-900);background:var(--white);margin-bottom:10px;font-family:var(--font-main);outline:none;transition:border-color .15s;}
.input-field:focus{border-color:var(--purple);}
.nudge-btn{font-size:11px;font-weight:600;color:var(--purple);background:var(--purple-light);border:1px solid var(--purple-mid);border-radius:var(--r-full);padding:3px 9px;cursor:pointer;font-family:var(--font-main);}
.nudge-sent{font-size:11px;font-weight:600;color:#0F6E56;background:var(--green-light);padding:3px 9px;border-radius:var(--r-full);}

/* ── CONGRATS SCREEN ── */
.congrats{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:32px 24px;}
.congrats-emoji{font-size:64px;margin-bottom:16px;animation:pop .4s ease;}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
.congrats-title{font-family:var(--font-display);font-size:28px;color:var(--gray-900);letter-spacing:-.5px;margin-bottom:12px;}
.congrats-title em{color:var(--purple);font-style:italic;}
.congrats-body{font-size:14px;color:var(--gray-500);line-height:1.7;margin-bottom:28px;}
.congrats-cta{display:block;width:100%;padding:14px;background:var(--purple);color:white;border:none;border-radius:var(--r-md);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-main);text-decoration:none;margin-bottom:10px;}
.congrats-secondary{font-size:13px;color:var(--gray-400);cursor:pointer;}
body.embedded{padding:10px 16px 24px;zoom:.58;}
body.embedded .progress-wrap{margin-bottom:10px;}
@media(max-width:700px){body.embedded{zoom:.82;}}
</style>
</head>
<body>
<script>
if(new URLSearchParams(window.location.search).has('embedded'))document.body.classList.add('embedded');
</script>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-header">
    <div class="progress-logo">mo<em>v</em>es <span style="font-family:var(--font-main);font-size:13px;font-weight:400;color:var(--gray-500);">tutorial</span></div>
    <div class="progress-meta">
      <span class="progress-label" id="step-label">step 1 of 8</span>
      <button class="reset-btn" onclick="prevStep()" id="back-btn" style="display:none;">‹ back</button>
      <button class="reset-btn" onclick="resetTutorial()">↺ reset</button>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:12%;"></div></div>
  <div class="step-dots" id="step-dots"></div>
</div>

<!-- PHONE -->
<div class="phone-frame" id="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="dynamic-island"></div>
    <span style="display:flex;gap:6px;align-items:center;">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y=".5" width="3" height="11.5" rx="1"/></svg>
      <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x=".5" y=".5" width="14" height="11" rx="2.5" stroke="currentColor" stroke-opacity=".3"/><rect x="2" y="2" width="10" height="8" rx="1.5" fill="currentColor"/></svg>
    </span>
  </div>

  <div class="app-header" id="app-header" style="display:none;">
    <div class="app-logo">mo<em>v</em>es</div>
    <div class="tab-row" id="tab-row">
      <div class="tab active" id="tab-friends">👥 friends</div>
      <div class="tab" id="tab-explore">🗺 explore</div>
      <div class="tab" id="tab-profile">🙂 profile</div>
    </div>
  </div>

  <div class="content-area" id="content"></div>

  <div class="bottom-nav" id="bottom-nav" style="display:none;">
    <div class="nav-item active" id="nav-friends"><div class="nav-icon">👥</div><span>friends</span></div>
    <div class="nav-item" id="nav-explore"><div class="nav-icon">🗺</div><span>explore</span></div>
    <div class="nav-item" id="nav-profile"><div class="nav-icon">🙂</div><span>profile</span></div>
  </div>

  <!-- overlays rendered here -->
  <div id="tut-overlay"></div>
  <div id="spotlight" class="spotlight" style="display:none;"></div>
  <div id="bubble-wrap" class="bubble-wrap" style="display:none;"></div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
let userName='', groupName='', groupFriends=[], oneoneName='', oneoneGroup='';
let floatedEvId=null, floatedActivityId=null, floatedGroupId='group1';
let currentStep=0;
let groupMemberVotes={}; // simulate friend votes
let myVotes={};
let myDateVotes={};
let nudgedMembers=new Set();
let exploreTab='event';

const STEPS=[
  'welcome',        // 0
  'name',           // 1
  'group-setup',    // 2
  'oneonone',       // 3
  'explore-intro',  // 4
  'float-event',    // 5
  'group-view',     // 6
  'nudge-step',     // 7
  'add-member',     // 8
  'activities',     // 9
  'float-activity', // 10
  'friend-floated', // 11
  'respond',        // 12
  'see-group',      // 13
  'congrats'        // 14
];
const TOTAL_STEPS=STEPS.length;
let addedMember='';

// Sample content
const SAMPLE_EVENTS=[
  {id:'e1',type:'event',emoji:'🎵',title:'Outside Lands Festival',meta:'Aug 8–10 · Golden Gate Park',cat:'Arts & culture'},
  {id:'e2',type:'event',emoji:'⚾',title:'Giants vs Dodgers',meta:'Jun 14 · 7:15 PM · Oracle Park',cat:'Outdoor'},
  {id:'e3',type:'event',emoji:'🌇',title:'Rooftop Happy Hour',meta:'Jun 7 · 5:00 PM · The Battery',cat:'Bars'},
];
const SAMPLE_ACTIVITIES=[
  {id:'a1',type:'activity',emoji:'🥐',title:'Brunch somewhere',meta:'Brunch & restaurants'},
  {id:'a2',type:'activity',emoji:'🎾',title:'Tennis in the park',meta:'Outdoor / active'},
  {id:'a3',type:'activity',emoji:'🎲',title:'Game night',meta:'Cozy / lowkey'},
  {id:'a4',type:'activity',emoji:'🥾',title:'Day hike',meta:'Outdoor / active',dateOptions:['Jun 14 · 10am','Jun 21 · 10am']},
];

function colorClass(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xffffffff;return'av-'+(Math.abs(h)%8);}
function initials(n){return n.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);}
function av(name,size='sm'){return`<div class="av av-${size} ${colorClass(name)}">${initials(name)}</div>`;}

// ── PROGRESS ───────────────────────────────────────────────
function updateProgress(){
  const pct=Math.round((currentStep/(TOTAL_STEPS-1))*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('step-label').textContent=`step ${currentStep+1} of ${TOTAL_STEPS}`;
  const dots=document.getElementById('step-dots');
  dots.innerHTML=STEPS.map((_,i)=>`<div class="step-dot ${i<currentStep?'done':i===currentStep?'active':''}"></div>`).join('');
  const backBtn=document.getElementById('back-btn');
  if(backBtn) backBtn.style.display=currentStep>0?'inline-block':'none';
}

function resetTutorial(){
  if(!confirm('reset the tutorial from the beginning?')) return;
  userName=''; groupName=''; groupFriends=[]; oneoneName=''; oneoneGroup='';
  floatedEvId=null; floatedActivityId=null; currentStep=0; groupMemberVotes={}; myVotes={}; nudgedMembers=new Set();
  document.getElementById('app-header').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  clearOverlays();
  goToStep(0);
}

// ── OVERLAY HELPERS ────────────────────────────────────────
function clearOverlays(){
  document.getElementById('tut-overlay').innerHTML='';
  document.getElementById('tut-overlay').style.pointerEvents='none';
  document.getElementById('spotlight').style.display='none';
  document.getElementById('bubble-wrap').style.display='none';
  document.getElementById('bubble-wrap').innerHTML='';
  // Remove any floating continue buttons
  if(window._contBtn){try{window._contBtn.remove();}catch(e){}window._contBtn=null;}
  ['final-cont-btn','group-cont-btn','member-cont-btn'].forEach(id=>{const el=document.getElementById(id);if(el)el.remove();});
  document.querySelectorAll('#phone>div[style*="bottom:28px"]').forEach(el=>el.remove());
}

function showBottomSheet({emoji,title,body,cta,ctaFn,skip,skipFn,dim=true}){
  clearOverlays();
  const ov=document.getElementById('tut-overlay');
  // When dim=false (input steps), only the sheet itself captures events, not the backdrop
  ov.style.pointerEvents=dim?'auto':'none';
  const skipHtml=skip?`<span class="bs-skip" onclick="${skipFn||'nextStep()'}">${skip}</span>`:'';
  ov.innerHTML=`<div class="bs-overlay" style="${dim?'background:rgba(28,26,23,.45);border-radius:44px;':''}pointer-events:${dim?'auto':'none'};">
    <div class="bs-sheet" style="pointer-events:auto;">
      <div class="bs-handle"></div>
      ${emoji?`<div class="bs-emoji">${emoji}</div>`:''}
      <div class="bs-title">${title}</div>
      <div class="bs-body">${body}</div>
      <button class="bs-cta" onclick="${ctaFn||'nextStep()'}">${cta}</button>
      ${skipHtml}
    </div>
  </div>`;
}

function showBubble({text,x,y,arrow,tapLabel,tapFn,timeout}){
  clearOverlays();
  const bw=document.getElementById('bubble-wrap');
  bw.style.display='block';
  bw.style.left=x+'px'; bw.style.top=y+'px';
  bw.innerHTML=`<div style="display:flex;flex-direction:column;align-items:${arrow==='left'?'flex-start':'center'};">
    ${arrow==='up'?`<div class="bubble-arrow up"></div>`:''}
    <div class="bubble">${text}${tapLabel?`<br><span class="bubble-tap" onclick="${tapFn||'nextStep()'}">${tapLabel} →</span>`:''}</div>
    ${(arrow==='down')?`<div class="bubble-arrow down"></div>`:''}
    ${arrow==='left'?`<div class="bubble-arrow left"></div>`:''}
  </div>`;
  if(timeout) setTimeout(()=>{bw.style.display='none';if(tapFn===undefined)nextStep();},timeout);
}

function spotlightEl(selector,padding=8){
  const phone=document.getElementById('phone');
  const el=phone.querySelector(selector);
  if(!el){return;}
  const pr=phone.getBoundingClientRect();
  const er=el.getBoundingClientRect();
  const sp=document.getElementById('spotlight');
  sp.style.display='block';
  sp.style.left=(er.left-pr.left-padding)+'px';
  sp.style.top=(er.top-pr.top-padding)+'px';
  sp.style.width=(er.width+padding*2)+'px';
  sp.style.height=(er.height+padding*2)+'px';
}

// ── NAVIGATION ─────────────────────────────────────────────
function nextStep(){
  if(currentStep<TOTAL_STEPS-1){currentStep++;goToStep(currentStep);}
}
function prevStep(){
  if(currentStep>0){currentStep--;goToStep(currentStep);}
}
function goToStep(s){
  currentStep=s;
  updateProgress();
  clearOverlays();
  const step=STEPS[s];
  steps[step]&&steps[step]();
}

function doRespond(v){
  if(v.startsWith('yes-')){
    const i=parseInt(v.split('-')[1]);
    if(!myDateVotes['af1'])myDateVotes['af1']={};
    myDateVotes['af1'][i]=myDateVotes['af1'][i]==='yes'?null:'yes';
    renderExploreWithFloat();
    // re-wire
    document.querySelectorAll('.respond-btn').forEach(btn=>{btn.onclick=()=>doRespond(btn.dataset.v);});
    return;
  }
  if(v.startsWith('no-')){
    const i=parseInt(v.split('-')[1]);
    if(!myDateVotes['af1'])myDateVotes['af1']={};
    myDateVotes['af1'][i]=myDateVotes['af1'][i]==='no'?null:'no';
    renderExploreWithFloat();
    document.querySelectorAll('.respond-btn').forEach(btn=>{btn.onclick=()=>doRespond(btn.dataset.v);});
    return;
  }
  myVotes['af1']=v;
  renderExploreWithFloat();
  setTimeout(()=>{
    showBubble({x:40,y:280,arrow:'up',
      text:`<strong>response saved!</strong> now let's see how it looks in the group view.`,
      tapLabel:'see in group',
      tapFn:'nextStep()',
    });
    document.getElementById('tut-overlay').style.pointerEvents='none';
  },300);
}

    </div>`).join('')}`;
  document.querySelectorAll('.nudge-btn').forEach(b=>{b.onclick=()=>{b.className='nudge-sent';b.textContent='nudged 👋';};});
}

function saveNewMember(){
  const el=document.getElementById('new-member-input');
  const name=(el&&el.value.trim())||'Alex';
  addedMember=name;
  groupFriends.push(name);
  const r=Math.random();
  // Always assign a real response (never pending) to demo auto-load
  groupMemberVotes[name]=r<0.55?'super':'could';
  renderGroupViewAddMember();
  // Show a bubble confirming
  setTimeout(()=>{
    showBubble({
      text:`<strong>${name} added!</strong> their interest in "${getEventTitle(floatedEvId)}" appeared automatically ✓`,
      x:30,y:490,arrow:'up',
    });
    document.getElementById('tut-overlay').style.pointerEvents='none';
    const cont=document.createElement('div');
    cont.id='member-cont-btn';
    cont.style.cssText='margin-top:16px;padding:0;';

}

function applyProposedDate(){
  const input=document.getElementById('propose-date-input');
  const val=(input&&input.value.trim())||'Jun 28 · 2pm';
  if(!window._hikeProposedDates) window._hikeProposedDates=[];
  if(!window._hikeProposedDates.includes(val)) window._hikeProposedDates.push(val);
  clearTutOverlay();
  renderGroupViewFull();
  appendFinalContinueBtn();
  // Show a confirmation bubble
  setTimeout(()=>{
    const bw=document.getElementById('bubble-wrap');
    bw.style.display='block'; bw.style.left='30px'; bw.style.top='460px';
    bw.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;">
      <div class="bubble" style="max-width:240px;">date added! <strong>${oneoneName||'your friend'}</strong> will get a nudge to mark their availability.<br><span class="bubble-tap" onclick="clearBubble()">got it ✓</span></div>
    </div>`;
    document.getElementById('tut-overlay').style.pointerEvents='none';
  },200);
}

function clearBubble(){
  const bw=document.getElementById('bubble-wrap');
  bw.style.display='none'; bw.innerHTML='';
}

function setTutDateAvail(i,v){
  if(!myDateVotes['af1']) myDateVotes['af1']={};
  myDateVotes['af1'][i]=myDateVotes['af1'][i]===v?null:v;
  renderGroupViewFull();
  // Re-append continue button after re-render
  appendFinalContinueBtn();
}

function clearTutOverlay(){
  const ov=document.getElementById('tut-overlay');
  ov.innerHTML=''; ov.style.pointerEvents='none';
}

function appendFinalContinueBtn(){
  // Remove any existing first
  const old=document.getElementById('final-cont-btn');
  if(old)old.remove();
  const contentDiv=document.getElementById('content');
  if(!contentDiv)return;
  const cont=document.createElement('div');
  cont.id='final-cont-btn';
  cont.style.cssText='margin-top:16px;padding:0;';
  cont.innerHTML=`<div style="font-size:12px;color:var(--gray-500);text-align:center;margin-bottom:8px;line-height:1.5;">try tapping <strong>📅 propose dates</strong> above, then continue when ready</div>
    <button onclick="nextStep()" style="width:100%;padding:13px;border-radius:var(--r-md);background:var(--purple);color:white;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-main);box-shadow:0 4px 16px rgba(124,111,247,.3);">I\'m ready → finish tutorial</button>`;
  contentDiv.appendChild(cont);
}

function unlockFinalPage(){
  // Just clear overlays and append the button — don't re-render (content already has the group view)
  const ov=document.getElementById('tut-overlay');
  ov.innerHTML=''; ov.style.pointerEvents='none';
  const bw=document.getElementById('bubble-wrap');
  bw.style.display='none'; bw.innerHTML='';
  appendFinalContinueBtn();
}

function switchSort(v){
  // Reorder members based on sort value to make it feel real
  if(v==='overlap'){
    // Put supers first, then coulds, then pass, then pending
    groupFriends.sort((a,b)=>{
      const order={super:0,could:1,pass:2,pending:3};
      return (order[groupMemberVotes[a]]||3)-(order[groupMemberVotes[b]]||3);
    });
  } else if(v==='date'){
    // Shuffle to simulate date sort
    groupFriends.reverse();
  } else {
    // floated first - keep current order (user floated, so their event is always first)
  }
  renderGroupViewAddMember();
  setTimeout(()=>{
    showBubble({
      text:`<strong>sorted by ${v==='floated'?'🌊 floated first':v==='overlap'?'🔥 most overlap':'📅 date/time'}</strong> — moves reorders so the most relevant plans bubble up`,
      x:30,y:185,arrow:'up',
    });
    document.getElementById('tut-overlay').style.pointerEvents='none';
  },150);
}

goToStep(0);
